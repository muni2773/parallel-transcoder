apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: transcoder-node
  labels:
    app.kubernetes.io/name: transcoder-node
spec:
  serviceName: transcoder
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: transcoder-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transcoder-node
    spec:
      serviceAccountName: transcoder-node
      terminationGracePeriodSeconds: 30
      # Spread pods across hosts so one node going down doesn't take the
      # whole cluster with it.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: transcoder-node
      containers:
        - name: transcoder-node
          image: transcoder-node:dev
          imagePullPolicy: IfNotPresent
          # Pod ordinal drives the master/worker split. Pod-0 bootstraps as
          # master; all others --join transcoder-node-0.<svc> on boot.
          # The shell wrapper extracts the ordinal from POD_NAME before
          # invoking the daemon, because the downward API can't slice strings.
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              ORDINAL="${POD_NAME##*-}"
              POD_PREFIX="${POD_NAME%-*}"
              export POD_ORDINAL="$ORDINAL"
              ARGS="--listen 0.0.0.0:9900 --k8s-mode \
                --worker-binary /usr/local/bin/transcoder-worker \
                --lib-dir /usr/local/lib"
              if [ "$ORDINAL" != "0" ]; then
                ARGS="$ARGS --join ${POD_PREFIX}-0.${SERVICE_NAME}.${POD_NAMESPACE}.svc.cluster.local:9900"
              fi
              if [ -n "${OBJECT_STORE_URL:-}" ]; then
                ARGS="$ARGS --object-store-url $OBJECT_STORE_URL"
              fi
              exec /usr/bin/tini -- /usr/local/bin/transcoder-node $ARGS
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: SERVICE_NAME
              valueFrom:
                configMapKeyRef:
                  name: transcoder-config
                  key: service-name
            - name: RUST_LOG
              valueFrom:
                configMapKeyRef:
                  name: transcoder-config
                  key: log-level
            # Overlays inject ENCODER_GPU and ENCODER_CPU_FEATURE via
            # nodeAffinity + env so detect_capabilities() picks the right
            # encoder for the node pool this pod landed on.
          ports:
            - name: cluster-ws
              containerPort: 9900
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: 9900
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9900
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # SIGTERM triggers the Rust handler which broadcasts NodeLeave;
                # sleep covers the broadcast latency before K8s kills the pod.
                command: ["/bin/sh", "-c", "kill -TERM 1; sleep 2"]
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "8"
              memory: "8Gi"
          volumeMounts:
            - name: scratch
              mountPath: /var/lib/transcoder/tmp
      volumes:
        - name: scratch
          emptyDir:
            sizeLimit: 20Gi
