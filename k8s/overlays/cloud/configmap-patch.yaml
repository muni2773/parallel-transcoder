apiVersion: v1
kind: ConfigMap
metadata:
  name: transcoder-config
data:
  # Real cluster: S3 (or GCS / Azure Blob via s3-compat). AWS IRSA injects
  # credentials through the ServiceAccount — override this value per cluster.
  object-store-url: "https://s3.us-east-1.amazonaws.com"
  object-store-bucket: "transcoder-segments"
  log-level: "info"
