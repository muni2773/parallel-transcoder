# Wire S3 access via AWS IRSA (EKS) or Workload Identity (GKE).
# Replace the annotation with your cluster's IAM role ARN / GSA.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: transcoder-node
  annotations:
    # EKS IRSA:
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/transcoder-segments-rw
    # GKE Workload Identity (uncomment, remove the EKS line):
    # iam.gke.io/gcp-service-account: transcoder@PROJECT.iam.gserviceaccount.com
