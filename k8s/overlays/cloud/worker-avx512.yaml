# AVX-512 CPU pool — fallback for when no GPU is available. Targets AMD
# Zen 4+ / Intel Sapphire Rapids+ nodes labeled by Node Feature Discovery
# (feature.node.kubernetes.io/cpu-cpuid.AVX512F=true).
#
# Encoder is SVT-AV1: AVX-512 gives the largest SIMD speedup there (~2x vs
# AVX2 on dense prediction loops). libx265 also benefits but less; libx264
# largely does not — hence the env-based encoder selection, not a build flag.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: transcoder-worker-avx512
  labels:
    app.kubernetes.io/name: transcoder-node
    pool: cpu-avx512
spec:
  replicas: 4
  selector:
    matchLabels:
      app.kubernetes.io/name: transcoder-node
      pool: cpu-avx512
  template:
    metadata:
      labels:
        app.kubernetes.io/name: transcoder-node
        pool: cpu-avx512
    spec:
      serviceAccountName: transcoder-node
      terminationGracePeriodSeconds: 30
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  # NFD-injected label; install Node Feature Discovery to
                  # populate feature.node.kubernetes.io/cpu-cpuid.AVX512F.
                  - key: feature.node.kubernetes.io/cpu-cpuid.AVX512F
                    operator: In
                    values: ["true"]
                  - key: workload-class
                    operator: In
                    values: ["cpu-avx512"]
      containers:
        - name: transcoder-node
          image: transcoder-node:dev
          command:
            - /usr/bin/tini
            - --
            - /usr/local/bin/transcoder-node
            - --listen
            - 0.0.0.0:9900
            - --k8s-mode
            - --join
            - transcoder-node-0.transcoder.transcoder.svc.cluster.local:9900
            - --worker-binary
            - /usr/local/bin/transcoder-worker
            - --lib-dir
            - /usr/local/lib
          env:
            - name: ENCODER_GPU
              value: "none"
            - name: ENCODER_CPU_FEATURE
              value: "avx512"
            - name: POD_ORDINAL
              value: "100"
            - name: OBJECT_STORE_URL
              valueFrom:
                configMapKeyRef:
                  name: transcoder-config
                  key: object-store-url
          resources:
            requests:
              cpu: "8"
              memory: "8Gi"
            limits:
              cpu: "16"
              memory: "16Gi"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "kill -TERM 1; sleep 2"]
