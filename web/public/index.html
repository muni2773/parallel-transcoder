      <!-- Actions -->
      <div class="panel-section">
        <div class="actions">
          <button class="btn btn-analyze" id="btnAnalyze" disabled>
            <span class="spinner"></span>
            <span class="btn-text">Analyze</span>
          </button>
          <button class="btn btn-transcode" id="btnTranscode" disabled>
            <span class="spinner"></span>
            <span class="btn-text">Transcode</span>
          </button>
        </div>
      </div>

      <!-- Cluster -->
      <div class="panel-section">
        <div class="section-label">Cluster</div>

        <div class="cluster-row">
          <input type="text" id="clusterMaster" placeholder="host:port" spellcheck="false">
          <button class="url-import-btn" id="clusterConnectBtn" type="button">Connect</button>
        </div>

        <div class="cluster-status-line">
          <span class="cluster-dot" id="clusterDot"></span>
          <span id="clusterStatusText">Not connected</span>
        </div>

        <label class="cluster-check">
          <input type="checkbox" id="clusterUse">
          <span>Submit transcode to cluster</span>
        </label>

        <div class="local-node-box" id="localNodeBox" style="display:none">
          <label class="field-label" for="nodeListen">Listen</label>
          <input type="text" id="nodeListen" value="0.0.0.0:9900" spellcheck="false">
          <label class="field-label" for="nodeJoin">Join (optional)</label>
          <input type="text" id="nodeJoin" placeholder="host:9900 — leave blank to bootstrap" spellcheck="false">
          <label class="field-label" for="nodeName">Node name</label>
          <input type="text" id="nodeName" placeholder="auto" spellcheck="false">

          <div class="local-node-actions">
            <button class="btn-start" id="btnNodeStart" type="button">Start Node</button>
            <button class="btn-stop" id="btnNodeStop" type="button" disabled>Stop</button>
          </div>

          <div class="local-node-status">
            <span class="cluster-dot" id="nodeDot"></span>
            <span id="nodeStatusText">Stopped</span>
          </div>
        </div>
      </div>

    </aside>

    <!-- ═══ RIGHT PANEL ═══ -->
    <main class="right-panel" id="mainContent">

      <div class="analysis-view" id="analysisView"></div>

      <section class="cluster-card" id="clusterCard">
        <div class="cluster-card-header">
          <h2>Cluster</h2>
          <div class="cluster-card-meta">
            <span class="cluster-dot" id="clusterCardDot"></span>
            <span id="clusterCardMeta">—</span>
          </div>
        </div>
        <div class="nodes-table-wrap" id="nodesTableWrap">
          <div class="cluster-empty" id="clusterEmpty">No nodes reported.</div>
        </div>
      </section>

      <div class="jobs-section" id="jobsSection">
        <div class="jobs-heading">Active Jobs</div>
        <div class="jobs-list" id="jobsList"></div>
      </div>

      <div class="empty-state" id="emptyState">
        <div class="empty-graphic">
          <div class="empty-ring"></div>
        </div>
        <div class="empty-text">Awaiting input</div>
      </div>

    </main>
  </div>
</div>

<script>
(function() {
  'use strict';

  /* ==================================================================
   * Utilities
   * ================================================================== */

  function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    var units = ['B', 'KB', 'MB', 'GB', 'TB'];
    var i = Math.floor(Math.log(bytes) / Math.log(1024));
    if (i >= units.length) i = units.length - 1;
    return (bytes / Math.pow(1024, i)).toFixed(i === 0 ? 0 : 2) + ' ' + units[i];
  }

  function formatTime(seconds) {
    var h = Math.floor(seconds / 3600);
    var m = Math.floor((seconds % 3600) / 60);
    var s = (seconds % 60).toFixed(2);
    if (h > 0) return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(5, '0');
    return m + ':' + String(s).padStart(5, '0');
  }

  function truncId(id) {
    return typeof id === 'string' ? id.substring(0, 8) : String(id);
  }

  function esc(str) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(str));
    return d.innerHTML;
  }

  /* ==================================================================
   * API
   * ================================================================== */

  var API = {
    upload: function(file, onProgress) {
      return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        var form = new FormData();
        form.append('video', file);
        xhr.open('POST', '/api/upload');
        xhr.upload.onprogress = function(e) {
          if (e.lengthComputable && onProgress) onProgress(Math.round((e.loaded / e.total) * 100));
        };
        xhr.onload = function() {
          if (xhr.status >= 200 && xhr.status < 300) {
            try { resolve(JSON.parse(xhr.responseText)); }
            catch (err) { reject(new Error('Invalid JSON response')); }
          } else {
            reject(new Error('Upload failed: ' + xhr.status));
          }
        };
        xhr.onerror = function() { reject(new Error('Network error')); };
        xhr.send(form);
      });
    },

    analyze: function(params) {
      return fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(params)
      }).then(function(r) {
        if (!r.ok) throw new Error('Analyze failed: ' + r.status);
        return r.json();
      });
    },

    transcode: function(params) {
      return fetch('/api/transcode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(params)
      }).then(function(r) {
        if (!r.ok) throw new Error('Transcode failed: ' + r.status);
        return r.json();
      });
    },

    getJobs: function() {
      return fetch('/api/jobs').then(function(r) {
        if (!r.ok) throw new Error('Failed to fetch jobs');
        return r.json();
      });
    },

    getJobFiles: function(id) {
      return fetch('/api/jobs/' + encodeURIComponent(id) + '/files').then(function(r) {
        if (!r.ok) throw new Error('Failed to fetch files');
        return r.json();
      });
    },

    cancelJob: function(id) {
      return fetch('/api/jobs/' + encodeURIComponent(id), { method: 'DELETE' }).then(function(r) {
        if (!r.ok) throw new Error('Failed to cancel');
        return r.json();
      });
    },

    importUrl: function(url) {
      return fetch('/api/url-import', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url })
      }).then(function(r) {
        if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || 'Import failed'); });
        return r.json();
      });
    },

    downloadUrl: function(jobId, filename) {
      return '/api/download/' + encodeURIComponent(jobId) + '/' + encodeURIComponent(filename);
    },

    clusterStatus: function(master) {
      var q = master ? '?master=' + encodeURIComponent(master) : '';
      return fetch('/api/cluster/status' + q).then(function(r) { return r.json(); });
    },

    clusterTranscode: function(master, params) {
      var body = Object.assign({}, params, master ? { master: master } : {});
      return fetch('/api/cluster/transcode', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      }).then(function(r) {
        if (!r.ok) return r.json().then(function(d) { throw new Error(d.error || ('Cluster submit failed: ' + r.status)); });
        return r.json();
      });
    }
  };

  /* ==================================================================
   * WebSocket
   * ================================================================== */

  var WS = {
    socket: null,
    timer: null,
    subs: new Set(),

    connect: function() {
      var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      try { WS.socket = new WebSocket(proto + '//' + location.host + '/ws'); }
      catch (e) { WS._retry(); return; }

      WS.socket.onopen = function() {
        UI.setWs(true);
        WS.subs.forEach(function(id) { WS._send({ type: 'subscribe', jobId: id }); });
      };

      WS.socket.onmessage = function(ev) {
        try { WS._handle(JSON.parse(ev.data)); } catch (e) {}
      };

      WS.socket.onclose = function() { UI.setWs(false); WS._retry(); };
      WS.socket.onerror = function() { UI.setWs(false); };
    },

    subscribe: function(id) {
      WS.subs.add(id);
      WS._send({ type: 'subscribe', jobId: id });
    },

    _send: function(d) {
      if (WS.socket && WS.socket.readyState === WebSocket.OPEN) WS.socket.send(JSON.stringify(d));
    },

    _retry: function() {
      if (WS.timer) return;
      WS.timer = setTimeout(function() { WS.timer = null; WS.connect(); }, 1000);
    },

    _handle: function(msg) {
      if (!msg || !msg.jobId) return;
      var job = App.jobs.get(msg.jobId);
      if (!job) return;

      switch (msg.type) {
        case 'progress':
          job.phase = msg.phase || job.phase;
          job.percent = typeof msg.percent === 'number' ? msg.percent : job.percent;
          job.message = msg.message || '';
          UI.updateJob(msg.jobId);
          break;
        case 'log':
          if (msg.line) {
            if (!job.logs) job.logs = [];
            job.logs.push(msg.line);
            if (job.logs.length > 200) job.logs = job.logs.slice(-200);
            UI.addLog(msg.jobId, msg.line);
            UI.parseSegStatus(msg.jobId, msg.line);
          }
          break;
        case 'complete':
          job.phase = 'complete';
          job.percent = 100;
          job.outputFiles = msg.outputFiles || [];
          WS.subs.delete(msg.jobId);
          UI.updateJob(msg.jobId);
          if (job.outputFiles.length === 0) {
            API.getJobFiles(msg.jobId).then(function(d) {
              job.outputFiles = (d && d.files) ? d.files : (Array.isArray(d) ? d : []);
              UI.updateJob(msg.jobId);
            }).catch(function() {});
          }
          break;
        case 'error':
          job.phase = 'error';
          job.errorMessage = msg.message || 'Unknown error';
          WS.subs.delete(msg.jobId);
          UI.updateJob(msg.jobId);
          break;
      }
    }
  };

  /* ==================================================================
   * UI
   * ================================================================== */

  var VU_SEGMENTS = 30; // number of LED segments in the VU meter

  /** Detect server platform and hide encoder options for wrong OS. */
  function detectPlatformEncoders() {
    fetch('/api/health').then(function(r) { return r.json(); }).then(function(data) {
      var isMac = data.platform === 'darwin';
      var isLinux = data.platform === 'linux';
      // Hide macOS-only encoders on Linux and vice versa
      document.querySelectorAll('.enc-macos').forEach(function(el) {
        el.style.display = isMac ? '' : 'none';
        el.disabled = !isMac;
      });
      document.querySelectorAll('.enc-linux').forEach(function(el) {
        el.style.display = isLinux ? '' : 'none';
        el.disabled = !isLinux;
      });
    }).catch(function() { /* offline — show all options */ });
  }

  /** Update UI hints when encoder changes (CRF range, preset labels, visibility). */
  function onEncoderChange() {
    var enc = document.getElementById('optEncoder').value;
    var crfInput = document.getElementById('optCrf');
    var crfHint = document.getElementById('crfHint');
    var grpPreset = document.getElementById('grpPreset');
    var grpCrf = document.getElementById('grpCrf');
    var isHW = enc.includes('videotoolbox') || enc.includes('nvenc') || enc.includes('vaapi');

    // Hardware encoders use bitrate, not CRF — hide CRF and preset
    grpCrf.style.display = isHW ? 'none' : '';
    grpPreset.style.display = isHW ? 'none' : '';

    if (isHW) { crfHint.textContent = ''; return; }

    // Set CRF range and hint per codec
    if (enc === 'libx265') {
      crfInput.max = 51;
      if (parseInt(crfInput.value) === 23) crfInput.value = 28; // x265 default
      crfHint.textContent = 'x265 default: 28 (0-51)';
    } else if (enc === 'libsvtav1') {
      crfInput.max = 63;
      if (parseInt(crfInput.value) === 23 || parseInt(crfInput.value) === 28) crfInput.value = 30;
      crfHint.textContent = 'SVT-AV1 default: 30 (0-63)';
    } else if (enc === 'libaom-av1') {
      crfInput.max = 63;
      if (parseInt(crfInput.value) === 23 || parseInt(crfInput.value) === 28) crfInput.value = 30;
      crfHint.textContent = 'libaom default: 30 (0-63)';
    } else {
      crfInput.max = 51;
      if (parseInt(crfInput.value) === 28 || parseInt(crfInput.value) === 30) crfInput.value = 23;
      crfHint.textContent = 'x264 default: 23 (0-51)';
    }
  }

  var UI = {
    els: {},

    init: function() {
      var ids = [
        'uploadZone', 'uploadBtn', 'fileInput', 'fileInfo', 'fileName', 'fileSize',
        'uploadProgress', 'uploadProgressFill', 'uploadProgressText', 'urlInput', 'urlImportBtn',
        'optMode', 'optTolerance', 'toleranceValue', 'grpTolerance', 'grpCrf', 'grpPreset', 'grpEncoder',
        'btnAnalyze', 'btnTranscode', 'wsDot', 'wsLabel',
        'analysisView', 'jobsSection', 'jobsList', 'mainContent', 'emptyState'
      ];
      ids.forEach(function(id) { UI.els[id] = document.getElementById(id); });
    },

    bind: function() {
      var zone = UI.els.uploadZone;

      zone.addEventListener('dragover', function(e) {
        e.preventDefault(); e.stopPropagation();
        zone.classList.add('drag-over');
      });
      zone.addEventListener('dragleave', function(e) {
        e.preventDefault(); e.stopPropagation();
        zone.classList.remove('drag-over');
      });
      zone.addEventListener('drop', function(e) {
        e.preventDefault(); e.stopPropagation();
        zone.classList.remove('drag-over');
        if (e.dataTransfer.files.length > 0) App.handleFile(e.dataTransfer.files[0]);
      });

      UI.els.uploadBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        UI.els.fileInput.click();
      });

      zone.addEventListener('click', function(e) {
        if (e.target === zone || e.target.closest('.upload-target') || e.target.closest('.upload-label')) {
          UI.els.fileInput.click();
        }
      });

      UI.els.fileInput.addEventListener('change', function() {
        if (this.files.length > 0) App.handleFile(this.files[0]);
      });

      UI.els.optMode.addEventListener('change', function() { UI.syncSettings(); });

      UI.els.optTolerance.addEventListener('input', function() {
        UI.els.toleranceValue.textContent = parseFloat(this.value).toFixed(2);
      });

      UI.els.urlImportBtn.addEventListener('click', function() { App.importUrl(); });
      UI.els.urlInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') App.importUrl();
      });

      UI.els.btnAnalyze.addEventListener('click', function() { App.analyze(); });
      UI.els.btnTranscode.addEventListener('click', function() { App.transcode(); });

      UI.syncSettings();
    },

    syncSettings: function() {
      var mode = UI.els.optMode.value;
      var isCopy = (mode === 'copy');
      var isSmart = (mode === 'smart' || mode === 'smart-auto');
      UI.els.grpTolerance.classList.toggle('hidden', !isSmart);
      UI.els.grpCrf.classList.toggle('hidden', isCopy);
      UI.els.grpPreset.classList.toggle('hidden', isCopy);
      UI.els.grpEncoder.classList.toggle('hidden', isCopy);
    },

    getSettings: function() {
      var mode = UI.els.optMode.value;
      var p = {
        uploadId: App.uploadId,
        format: document.getElementById('optFormat').value,
        mode: mode,
        workers: parseInt(document.getElementById('optWorkers').value, 10) || 0,
        verbose: document.getElementById('optVerbose').checked
      };
      if (mode === 'smart' || mode === 'smart-auto') {
        p.smartTolerance = parseFloat(UI.els.optTolerance.value);
      }
      if (mode !== 'copy') {
        p.crf = parseInt(document.getElementById('optCrf').value, 10);
        p.preset = document.getElementById('optPreset').value;
        p.encoder = document.getElementById('optEncoder').value;
      }
      return p;
    },

    setWs: function(on) {
      UI.els.wsDot.classList.toggle('connected', on);
      UI.els.wsLabel.textContent = on ? 'Online' : 'Offline';
    },

    setBtnLoading: function(btn, loading) {
      if (loading) { btn.classList.add('loading'); btn.disabled = true; }
      else { btn.classList.remove('loading'); btn.disabled = !App.uploadId; }
    },

    updateEmpty: function() {
      var has = UI.els.analysisView.classList.contains('visible') ||
                UI.els.jobsSection.classList.contains('visible');
      UI.els.emptyState.style.display = has ? 'none' : 'flex';
    },

    /* ─── Analysis ─── */

    renderAnalysis: function(data) {
      var h = '<div class="analysis-card">';
      h += '<div class="analysis-header">';
      h += '<h2>Analysis Report</h2>';
      if (data.summary) {
        h += '<div class="analysis-summary">';
        h += '<span class="badge badge-copy">' + (data.summary.copy_segments || 0) + ' copy</span>';
        h += '<span class="badge badge-encode">' + (data.summary.encode_segments || 0) + ' encode</span>';
        h += '<span class="badge badge-total">' + (data.summary.total_segments || 0) + ' total</span>';
        h += '</div>';
      }
      h += '</div><div class="analysis-body">';

      if (data.summary && data.summary.global_blockers && data.summary.global_blockers.length > 0) {
        h += '<div class="global-blockers">';
        data.summary.global_blockers.forEach(function(b) {
          h += '<div class="blocker-item">' + esc(b) + '</div>';
        });
        h += '</div>';
      }

      if (data.segments && data.segments.length > 0) {
        h += '<div class="segments-table-wrap"><table class="segments-table">';
        h += '<thead><tr><th>ID</th><th>Time Range</th><th>Decision</th><th>Bitrate Ratio</th><th>Reasons</th></tr></thead>';
        h += '<tbody>';
        data.segments.forEach(function(seg) {
          var bc = seg.decision === 'copy' ? 'badge-copy' : 'badge-encode';
          var reasons = (seg.reasons && seg.reasons.length > 0) ? seg.reasons.map(esc).join('; ') : '<span style="color:var(--text-muted)">--</span>';
          h += '<tr>';
          h += '<td>' + seg.id + '</td>';
          h += '<td>' + formatTime(seg.start_time) + ' \u2013 ' + formatTime(seg.end_time) + '</td>';
          h += '<td><span class="badge ' + bc + '">' + esc(seg.decision) + '</span></td>';
          h += '<td>' + (typeof seg.bitrate_ratio === 'number' ? seg.bitrate_ratio.toFixed(2) : '--') + '</td>';
          h += '<td class="reasons-cell">' + reasons + '</td>';
          h += '</tr>';
        });
        h += '</tbody></table></div>';
      }

      h += '</div></div>';
      UI.els.analysisView.innerHTML = h;
      UI.els.analysisView.classList.add('visible');
      UI.updateEmpty();
    },

    /* ─── Job Cards ─── */

    createJobCard: function(jobId) {
      var job = App.jobs.get(jobId);
      if (!job) return;

      UI.els.jobsSection.classList.add('visible');
      UI.updateEmpty();

      var card = document.createElement('div');
      card.className = 'job-card';
      card.id = 'job-' + jobId;

      card.innerHTML =
        '<div class="job-card-header">' +
          '<span class="job-id">' + esc(truncId(jobId)) + '</span>' +
          '<div class="job-actions">' +
            '<span class="badge badge-analyzing" data-role="phase-badge">Pending</span>' +
            '<button class="btn-cancel" data-role="cancel-btn">Cancel</button>' +
          '</div>' +
        '</div>' +
        '<div class="job-card-body">' +
          '<div class="vu-meter-wrap">' +
            '<div class="vu-meter-header">' +
              '<span class="vu-phase" data-role="phase-text">Waiting...</span>' +
              '<span class="vu-percent" data-role="percent-text">0%</span>' +
            '</div>' +
            '<div class="vu-meter" data-role="vu-meter">' + UI._buildVU() + '</div>' +
            '<div class="simple-bar" data-role="simple-bar"><div class="simple-bar-fill" data-role="simple-bar-fill"></div></div>' +
          '</div>' +
          '<div class="segment-strip" data-role="segment-strip"></div>' +
          '<div class="log-tail" data-role="log-tail"></div>' +
          '<div class="download-links" data-role="download-links" style="display:none"></div>' +
        '</div>';

      card.querySelector('[data-role="cancel-btn"]').addEventListener('click', function() {
        App.cancelJob(jobId);
      });

      UI.els.jobsList.prepend(card);
      UI.updateJob(jobId);
    },

    _buildVU: function() {
      var h = '';
      for (var i = 0; i < VU_SEGMENTS; i++) h += '<div class="vu-seg"></div>';
      return h;
    },

    updateJob: function(jobId) {
      var card = document.getElementById('job-' + jobId);
      if (!card) return;
      var job = App.jobs.get(jobId);
      if (!job) return;

      var phaseBadge = card.querySelector('[data-role="phase-badge"]');
      var phaseText = card.querySelector('[data-role="phase-text"]');
      var percentText = card.querySelector('[data-role="percent-text"]');
      var vuMeter = card.querySelector('[data-role="vu-meter"]');
      var simpleBarFill = card.querySelector('[data-role="simple-bar-fill"]');
      var cancelBtn = card.querySelector('[data-role="cancel-btn"]');
      var dlLinks = card.querySelector('[data-role="download-links"]');

      var phase = job.phase || 'pending';
      var pm = {
        pending:    { cls: 'badge-analyzing', label: 'Pending' },
        starting:   { cls: 'badge-analyzing', label: 'Starting' },
        analyzing:  { cls: 'badge-analyzing', label: 'Analyzing' },
        splitting:  { cls: 'badge-splitting', label: 'Splitting' },
        encoding:   { cls: 'badge-encoding',  label: 'Encoding' },
        finalizing: { cls: 'badge-finalizing', label: 'Finalizing' },
        complete:   { cls: 'badge-complete',  label: 'Complete' },
        error:      { cls: 'badge-error',     label: 'Error' },
        cancelled:  { cls: 'badge-cancelled', label: 'Cancelled' }
      };
      var pi = pm[phase] || pm.pending;
      phaseBadge.className = 'badge ' + pi.cls;
      phaseBadge.textContent = pi.label;

      // Phase text
      var msg = job.message || (pi.label + '...');
      if (phase === 'complete') msg = 'Completed';
      if (phase === 'error') msg = job.errorMessage || 'Error';
      if (phase === 'cancelled') msg = 'Cancelled';
      phaseText.textContent = msg;

      // Percent
      var pct = job.percent || 0;
      percentText.textContent = Math.round(pct) + '%';

      // VU meter: light up segments
      var litCount = Math.round((pct / 100) * VU_SEGMENTS);
      var segs = vuMeter.children;
      for (var i = 0; i < segs.length; i++) {
        if (i < litCount) {
          // Green zone: 0-70%, amber: 70-90%, red: 90-100%
          var ratio = i / VU_SEGMENTS;
          if (phase === 'error') segs[i].className = 'vu-seg lit-red';
          else if (phase === 'complete') segs[i].className = 'vu-seg lit-green';
          else if (ratio >= 0.9) segs[i].className = 'vu-seg lit-red';
          else if (ratio >= 0.7) segs[i].className = 'vu-seg lit-amber';
          else segs[i].className = 'vu-seg lit-green';
        } else {
          segs[i].className = 'vu-seg';
        }
      }

      // Simple bar fallback
      simpleBarFill.style.width = pct + '%';
      simpleBarFill.classList.toggle('complete', phase === 'complete');
      simpleBarFill.classList.toggle('error', phase === 'error');

      // Card accent
      card.className = 'job-card' + (phase === 'complete' ? ' phase-complete' : '') + (phase === 'error' ? ' phase-error' : '');

      // Cancel btn
      var active = (phase !== 'complete' && phase !== 'error' && phase !== 'cancelled');
      cancelBtn.style.display = active ? 'inline-flex' : 'none';

      // Downloads
      if (phase === 'complete' && job.outputFiles && job.outputFiles.length > 0) {
        var lh = '';
        job.outputFiles.forEach(function(f) {
          var name = typeof f === 'string' ? f : f.name || f.filename || '';
          if (!name) return;
          lh += '<a class="download-link" href="' + esc(API.downloadUrl(jobId, name)) +
                '" download="' + esc(name) + '">' + esc(name) + '</a>';
        });
        dlLinks.innerHTML = lh;
        dlLinks.style.display = lh ? 'flex' : 'none';
      }
    },

    addLog: function(jobId, line) {
      var card = document.getElementById('job-' + jobId);
      if (!card) return;
      var tail = card.querySelector('[data-role="log-tail"]');
      if (!tail) return;
      var el = document.createElement('div');
      el.className = 'log-line';
      el.textContent = line;
      tail.appendChild(el);
      while (tail.children.length > 25) tail.removeChild(tail.firstChild);
      tail.scrollTop = tail.scrollHeight;
    },

    parseSegStatus: function(jobId, line) {
      var job = App.jobs.get(jobId);
      if (!job) return;
      var card = document.getElementById('job-' + jobId);
      if (!card) return;
      var strip = card.querySelector('[data-role="segment-strip"]');
      if (!strip) return;

      var segMatch = line.match(/[Ss]egment\s+(\d+)\s*:\s*(encoding|done|copied|complete|pending|in.?progress)/i);
      if (segMatch) {
        var idx = parseInt(segMatch[1], 10);
        var st = segMatch[2].toLowerCase();
        if (st === 'complete') st = 'done';
        if (st === 'in-progress' || st === 'in progress') st = 'encoding';
        if (idx < strip.children.length) strip.children[idx].className = 'seg-block ' + st;
      }

      var countMatch = line.match(/(\d+)\s+segments?\s+(found|total|created)/i);
      if (countMatch && !job._segInit) {
        var count = parseInt(countMatch[1], 10);
        if (count > 0 && count < 500) {
          job.segments = count;
          job._segInit = true;
          strip.innerHTML = '';
          for (var i = 0; i < count; i++) {
            var b = document.createElement('div');
            b.className = 'seg-block pending';
            strip.appendChild(b);
          }
        }
      }
    }
  };

  /* ==================================================================
   * App
   * ================================================================== */

  /* ==================================================================
   * Cluster
   * ================================================================== */

  var Cluster = {
    master: null,
    useCluster: false,
    pollTimer: null,
    els: {},
    lastStatus: null,

    init: function() {
      var ids = [
        'clusterMaster', 'clusterConnectBtn', 'clusterDot', 'clusterStatusText',
        'clusterUse', 'localNodeBox', 'nodeListen', 'nodeJoin', 'nodeName',
        'btnNodeStart', 'btnNodeStop', 'nodeDot', 'nodeStatusText',
        'clusterCard', 'clusterCardDot', 'clusterCardMeta', 'nodesTableWrap', 'clusterEmpty'
      ];
      ids.forEach(function(id) { Cluster.els[id] = document.getElementById(id); });

      try {
        Cluster.master = localStorage.getItem('cluster.master') || '';
        Cluster.useCluster = localStorage.getItem('cluster.use') === '1';
      } catch (e) {}

      if (Cluster.master) Cluster.els.clusterMaster.value = Cluster.master;
      Cluster.els.clusterUse.checked = Cluster.useCluster;

      Cluster.els.clusterConnectBtn.addEventListener('click', Cluster.connect);
      Cluster.els.clusterMaster.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') Cluster.connect();
      });
      Cluster.els.clusterUse.addEventListener('change', function() {
        Cluster.useCluster = this.checked;
        try { localStorage.setItem('cluster.use', Cluster.useCluster ? '1' : '0'); } catch (e) {}
      });

      // Desktop-only local node controls
      if (window.desktop && window.desktop.cluster) {
        Cluster.els.localNodeBox.style.display = '';
        Cluster.els.btnNodeStart.addEventListener('click', Cluster.startLocalNode);
        Cluster.els.btnNodeStop.addEventListener('click', Cluster.stopLocalNode);

        window.desktop.cluster.onState(Cluster.renderLocalNode);
        window.desktop.cluster.getNodeState().then(function(r) {
          if (r && r.ok) Cluster.renderLocalNode(r.state);
        });
      }

      if (Cluster.master) Cluster.connect();
    },

    connect: function() {
      var m = (Cluster.els.clusterMaster.value || '').trim();
      if (!m) {
        Cluster.setStatus(false, 'No master set');
        return;
      }
      if (!/^[A-Za-z0-9_.\-]+:\d+$/.test(m)) {
        Cluster.setStatus(false, 'Invalid host:port');
        return;
      }
      Cluster.master = m;
      try { localStorage.setItem('cluster.master', m); } catch (e) {}
      Cluster.setStatus(null, 'Checking...');
      Cluster.refresh();

      if (Cluster.pollTimer) clearInterval(Cluster.pollTimer);
      Cluster.pollTimer = setInterval(Cluster.refresh, 5000);
    },

    refresh: function() {
      if (!Cluster.master) return;
      API.clusterStatus(Cluster.master).then(function(data) {
        if (data && data.error) {
          Cluster.setStatus(false, data.error);
          Cluster.renderNodes(null);
          return;
        }
        Cluster.lastStatus = data;
        var nodes = data.nodes || [];
        var leader = data.leader_id || data.leader || null;
        Cluster.setStatus(true, nodes.length + ' node' + (nodes.length === 1 ? '' : 's'));
        Cluster.renderNodes(data);
        Cluster.els.clusterCardMeta.textContent =
          Cluster.master + ' \u2022 ' + nodes.length + ' node' + (nodes.length === 1 ? '' : 's') +
          (leader ? ' \u2022 leader ' + String(leader).substring(0, 8) : '');
        Cluster.els.clusterCardDot.className = 'cluster-dot online';
      }).catch(function(err) {
        Cluster.setStatus(false, 'Unreachable');
        Cluster.renderNodes(null);
      });
    },

    setStatus: function(on, label) {
      var dot = Cluster.els.clusterDot;
      dot.className = 'cluster-dot' + (on === true ? ' online' : on === false ? ' offline' : '');
      Cluster.els.clusterStatusText.textContent = label;
    },

    renderNodes: function(data) {
      var card = Cluster.els.clusterCard;
      var wrap = Cluster.els.nodesTableWrap;
      var empty = Cluster.els.clusterEmpty;

      if (!data) {
        card.classList.add('visible');
        wrap.innerHTML = '<div class="cluster-empty">Cluster unreachable.</div>';
        Cluster.els.clusterCardDot.className = 'cluster-dot offline';
        return;
      }

      card.classList.add('visible');
      var nodes = data.nodes || [];
      if (nodes.length === 0) {
        wrap.innerHTML = '<div class="cluster-empty">No nodes reported.</div>';
        return;
      }

      var leader = data.leader_id || data.leader || null;
      var h = '<table class="nodes-table">';
      h += '<thead><tr><th>Name</th><th>ID</th><th>Role</th><th>Address</th><th>State</th><th>Encoders</th></tr></thead><tbody>';
      nodes.forEach(function(n) {
        var id = n.id || n.node_id || '';
        var isLeader = leader && String(id) === String(leader);
        var role = isLeader ? 'master' : 'worker';
        var state = n.state || n.status || (n.alive === false ? 'down' : 'up');
        var addr = n.address || n.listen || '';
        var encList = '';
        if (Array.isArray(n.capabilities)) encList = n.capabilities.join(', ');
        else if (n.capabilities && Array.isArray(n.capabilities.encoders)) encList = n.capabilities.encoders.join(', ');
        else if (Array.isArray(n.encoders)) encList = n.encoders.join(', ');
        h += '<tr>';
        h += '<td>' + esc(String(n.name || '')) + '</td>';
        h += '<td>' + esc(truncId(String(id))) + '</td>';
        h += '<td><span class="node-role ' + role + '">' + role + '</span></td>';
        h += '<td>' + esc(String(addr)) + '</td>';
        h += '<td>' + esc(String(state)) + '</td>';
        h += '<td>' + esc(encList || '\u2014') + '</td>';
        h += '</tr>';
      });
      h += '</tbody></table>';
      wrap.innerHTML = h;
    },

    startLocalNode: function() {
      var opts = {
        listen: (Cluster.els.nodeListen.value || '0.0.0.0:9900').trim(),
        join: (Cluster.els.nodeJoin.value || '').trim() || null,
        name: (Cluster.els.nodeName.value || '').trim() || undefined,
      };
      Cluster.els.btnNodeStart.disabled = true;
      window.desktop.cluster.startNode(opts).then(function(r) {
        if (!r || !r.ok) {
          Cluster.els.btnNodeStart.disabled = false;
          alert('Failed to start node: ' + (r && r.error ? r.error : 'unknown'));
          return;
        }
        // Auto-fill master field to local address if not set
        if (!Cluster.els.clusterMaster.value) {
          var listen = r.state.listen || '';
          var hostPort = listen.replace(/^0\.0\.0\.0:/, '127.0.0.1:');
          Cluster.els.clusterMaster.value = hostPort;
          setTimeout(Cluster.connect, 500);
        }
      });
    },

    stopLocalNode: function() {
      Cluster.els.btnNodeStop.disabled = true;
      window.desktop.cluster.stopNode();
    },

    renderLocalNode: function(state) {
      var running = !!(state && state.running);
      Cluster.els.btnNodeStart.disabled = running;
      Cluster.els.btnNodeStop.disabled = !running;
      Cluster.els.nodeDot.className = 'cluster-dot' + (running ? ' online' : ' offline');
      if (running) {
        var label = state.listen + (state.joinedMaster ? '  \u2192  ' + state.joinedMaster : '  (bootstrap)');
        Cluster.els.nodeStatusText.textContent = label;
      } else {
        Cluster.els.nodeStatusText.textContent = 'Stopped';
      }
    }
  };

  var App = {
    uploadId: null,
    jobs: new Map(),

    init: function() {
      UI.init();
      UI.bind();
      WS.connect();
      Cluster.init();
      App.loadJobs();
    },

    loadJobs: function() {
      API.getJobs().then(function(data) {
        var list = Array.isArray(data) ? data : (data && data.jobs ? data.jobs : []);
        if (list.length === 0) return;
        list.forEach(function(j) {
          var id = j.jobId || j.id;
          if (!id) return;
          App.jobs.set(id, {
            phase: j.phase || j.status || 'pending',
            percent: j.percent || 0,
            message: j.message || '',
            logs: [],
            segments: j.segments || 0,
            outputFiles: j.outputFiles || []
          });
          UI.createJobCard(id);
          var ph = j.phase || j.status || 'pending';
          if (ph !== 'complete' && ph !== 'error' && ph !== 'cancelled') WS.subscribe(id);
        });
      }).catch(function() {});
    },

    importUrl: function() {
      var url = (UI.els.urlInput.value || '').trim();
      if (!url) return;

      UI.els.urlImportBtn.disabled = true;
      UI.els.urlImportBtn.textContent = 'Downloading\u2026';

      UI.els.fileInfo.style.display = 'block';
      UI.els.fileName.textContent = url.split('/').pop() || url;
      UI.els.fileSize.textContent = 'Downloading from URL\u2026';
      UI.els.uploadZone.classList.add('has-file');
      UI.els.uploadProgress.classList.add('active');
      UI.els.uploadProgressFill.style.width = '0%';
      UI.els.uploadProgressText.textContent = 'Downloading\u2026';
      UI.els.btnAnalyze.disabled = true;
      UI.els.btnTranscode.disabled = true;
      App.uploadId = null;

      API.importUrl(url).then(function(resp) {
        App.uploadId = resp.uploadId;
        UI.els.fileName.textContent = resp.originalName || url.split('/').pop();
        UI.els.fileSize.textContent = formatSize(resp.size);
        UI.els.uploadProgressFill.style.width = '100%';
        UI.els.uploadProgressText.textContent = 'Import complete';
        UI.els.btnAnalyze.disabled = false;
        UI.els.btnTranscode.disabled = false;
        UI.els.urlImportBtn.disabled = false;
        UI.els.urlImportBtn.textContent = 'Import';
      }).catch(function(err) {
        UI.els.uploadProgressText.textContent = 'Import failed';
        UI.els.uploadProgressFill.style.width = '0%';
        UI.els.uploadZone.classList.remove('has-file');
        UI.els.fileInfo.style.display = 'none';
        UI.els.urlImportBtn.disabled = false;
        UI.els.urlImportBtn.textContent = 'Import';
        console.error('URL import error:', err);
        alert('URL import failed: ' + err.message);
      });
    },

    handleFile: function(file) {
      if (!file) return;

      UI.els.fileInfo.style.display = 'block';
      UI.els.fileName.textContent = file.name;
      UI.els.fileSize.textContent = formatSize(file.size);
      UI.els.uploadZone.classList.add('has-file');

      UI.els.uploadProgress.classList.add('active');
      UI.els.uploadProgressFill.style.width = '0%';
      UI.els.uploadProgressText.textContent = '0%';

      UI.els.btnAnalyze.disabled = true;
      UI.els.btnTranscode.disabled = true;
      App.uploadId = null;

      API.upload(file, function(pct) {
        UI.els.uploadProgressFill.style.width = pct + '%';
        UI.els.uploadProgressText.textContent = pct + '%';
      }).then(function(resp) {
        App.uploadId = resp.uploadId || resp.id || resp.upload_id;
        UI.els.uploadProgressFill.style.width = '100%';
        UI.els.uploadProgressText.textContent = 'Upload complete';
        UI.els.btnAnalyze.disabled = false;
        UI.els.btnTranscode.disabled = false;
      }).catch(function(err) {
        UI.els.uploadProgressText.textContent = 'Upload failed';
        UI.els.uploadProgressFill.style.width = '0%';
        UI.els.uploadZone.classList.remove('has-file');
        console.error('Upload error:', err);
      });
    },

    analyze: function() {
      if (!App.uploadId) return;
      UI.setBtnLoading(UI.els.btnAnalyze, true);
      API.analyze(UI.getSettings()).then(function(data) {
        UI.setBtnLoading(UI.els.btnAnalyze, false);
        UI.renderAnalysis(data);
      }).catch(function(err) {
        UI.setBtnLoading(UI.els.btnAnalyze, false);
        console.error('Analyze error:', err);
        alert('Analysis failed: ' + err.message);
      });
    },

    transcode: function() {
      if (!App.uploadId) return;
      UI.setBtnLoading(UI.els.btnTranscode, true);

      var useCluster = Cluster.useCluster && !!Cluster.master;
      var settings = UI.getSettings();

      var submit = useCluster
        ? API.clusterTranscode(Cluster.master, settings)
        : API.transcode(settings);

      submit.then(function(data) {
        UI.setBtnLoading(UI.els.btnTranscode, false);
        var jobId = data.jobId || data.id || data.job_id;
        if (!jobId) { console.error('No jobId'); return; }
        App.jobs.set(jobId, {
          phase: useCluster ? 'starting' : 'pending',
          percent: 0,
          message: useCluster ? ('Submitted to cluster ' + (data.master || Cluster.master)) : '',
          logs: [], segments: 0, outputFiles: [], cluster: useCluster
        });
        UI.createJobCard(jobId);
        if (!useCluster) WS.subscribe(jobId);
        else Cluster.refresh();
      }).catch(function(err) {
        UI.setBtnLoading(UI.els.btnTranscode, false);
        console.error('Transcode error:', err);
        alert((useCluster ? 'Cluster submit' : 'Transcode') + ' failed: ' + err.message);
      });
    },

    cancelJob: function(jobId) {
      var job = App.jobs.get(jobId);
      if (!job) return;
      API.cancelJob(jobId).then(function() {
        job.phase = 'cancelled';
        WS.subs.delete(jobId);
        UI.updateJob(jobId);
      }).catch(function(err) { console.error('Cancel error:', err); });
    }
  };

  /* ==================================================================
   * Boot
   * ================================================================== */

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { App.init(); detectPlatformEncoders(); });
  } else {
    App.init();
    detectPlatformEncoders();
  }

})();
</script>
